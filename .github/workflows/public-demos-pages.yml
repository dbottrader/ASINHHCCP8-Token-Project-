name: Deploy public demos to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "public_demos/**"
      - ".github/workflows/public-demos-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: public-demos-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload public demo artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public_demos

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
